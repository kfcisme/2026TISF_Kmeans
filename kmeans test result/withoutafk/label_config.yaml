
unknown_percentile: 97          # 距中心最遠的 3% → Unknown
softmax_confidence_min: 0.6     # 低於 0.6 不硬標
secondary_gap_threshold: 999   # 主/副軸分數差小於此值 → 輸出混合標籤
top_m: 5                   # 每群輸出前 m 個關鍵特徵（按中心絕對值）
# tau:  自訂軟指派溫度（不設定則自動用最小距離的中位數）

axes:
  Build:
    rate_block_place: 1.0
    rate_multi_place: 0.8
    rate_craft: 0.8
    rate_furnace_extract: 0.6
    build_bias: 0.8
    rate_block_break: -0.1

  Exploration:
    rate_chunkload: 0.8
    rate_teleport: 0.8
    explore_intensity: 0.8

  Survival:
    rate_dmg_by_entity: 0.5
    rate_exp_change: 0.7
    rate_level_change: 0.7
    rate_respawn: 0.5
    rate_furnace_extract: 0.7
    survival_intensity: 0.8

  Redstone:
    rate_redstone: 1.0
    rate_craft: 0.8
    redstone_intensity: 0.9

  PvP:
    rate_player_death: 0.6
    rate_dmg_by_entity: 0.7
    pvp_intensity: 0.8

  Explosive:
    rate_tnt_prime: 0.9
    rate_explosion: 0.9
    rate_block_damage: 0.3
    explosive_intensity: 0.6

  Social:
    rate_chat: 0.8
    rate_item_drop: 0.4
    rate_inv_open: 0.4
    rate_inv_close: 0.4
    social_intensity: 0.6

  AFK:
    afk_ratio: 1.0

afk_threshold: 0.95
sample_override:
  max_fraction_per_label: 0.20     # ★ 單一覆寫標籤上限 20%
  require_pmax_min: 0.60           # ★ 覆寫前至少要有基本穩定度
  top_m: 3

  explorer:
    by_percentile:
      rate_chunkload: 98           # ★ 嚴格一點，避免太多被覆寫成Exploration
    also_require_any:
      - explore_intensity
    anti_features:
      survival_intensity: 90
      rate_redstone: 90       # ★ 如果生存也很高，就不要覆寫成Exploration

  survival:
    by_percentile:
      survival_intensity: 98       # ★ 嚴格一點，避免到處貼 Survival
    also_require_any:
      - rate_dmg_by_entity
    anti_features:
      rate_chunkload: 90 
      rate_redstone: 90
  
  redstone:
    by_percentile:
      rate_redstone: 98
    also_require_any:
      - redstone_intensity
    anti_features:
      rate_chunkload: 90 
      survival_intensity: 90 